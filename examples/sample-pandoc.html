<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sample Pandoc Output</title>
  </head>
  <body>
    <h1>Beacon Preview Prototype</h1>
    <p>This paragraph stands in for Pandoc-rendered prose.</p>

    <h2>List Section</h2>
    <ul>
      <li>First item</li>
      <li>Second item</li>
    </ul>

    <h2>Code Section</h2>
    <div class="sourceCode" id="cb1">
      <pre class="sourceCode elisp"><code>(message "hello")</code></pre>
    </div>

    <blockquote>
      <p>Quoted text also becomes a jump target.</p>
    </blockquote>

    <table>
      <thead>
        <tr><th>Name</th><th>Role</th></tr>
      </thead>
      <tbody>
        <tr><td>Pandoc</td><td>Renderer</td></tr>
      </tbody>
    </table>
  </body>
</html>
