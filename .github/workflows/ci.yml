name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Emacs
        uses: purcell/setup-emacs@v8.0
        with:
          version: "29.4"

      - name: Byte-compile package
        run: emacs --batch -Q -L lisp -f batch-byte-compile lisp/beacon-preview.el

      - name: Run test suite
        run: make test
