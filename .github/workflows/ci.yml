name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Emacs
        uses: purcell/setup-emacs@v8.0
        with:
          version: "29.4"

      - name: Install Markdown tree-sitter grammars
        run: |
          mkdir -p "$HOME/.emacs.d/tree-sitter"
          git clone --depth=1 https://github.com/tree-sitter-grammars/tree-sitter-markdown /tmp/tree-sitter-markdown

          cc -fPIC -I /tmp/tree-sitter-markdown/tree-sitter-markdown/src -c \
            /tmp/tree-sitter-markdown/tree-sitter-markdown/src/parser.c \
            /tmp/tree-sitter-markdown/tree-sitter-markdown/src/scanner.c
          cc -shared -o "$HOME/.emacs.d/tree-sitter/libtree-sitter-markdown.so" parser.o scanner.o
          rm -f parser.o scanner.o

          cc -fPIC -I /tmp/tree-sitter-markdown/tree-sitter-markdown-inline/src -c \
            /tmp/tree-sitter-markdown/tree-sitter-markdown-inline/src/parser.c \
            /tmp/tree-sitter-markdown/tree-sitter-markdown-inline/src/scanner.c
          cc -shared -o "$HOME/.emacs.d/tree-sitter/libtree-sitter-markdown-inline.so" parser.o scanner.o
          rm -f parser.o scanner.o

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Byte-compile package
        run: emacs --batch -Q -L lisp -f batch-byte-compile lisp/beacon-preview.el

      - name: Run test suite
        run: make test
